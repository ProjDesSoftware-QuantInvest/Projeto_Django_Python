<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Nova Transação</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #121212; color: #e0e0e0; }
        .container { max-width: 600px; margin: 0 auto; background: #1e1e1e; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        h2 { color: #ffffff; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #ccc; }
        
        /* Inputs Dark Mode */
        input, select { width: 100%; padding: 10px; background-color: #121212; color: #fff; border: 1px solid #444; border-radius: 4px; box-sizing: border-box; }
        input:focus, select:focus { border-color: #007bff; outline: none; }
        
        /* Botões */
        .btn-salvar { width: 100%; padding: 10px; background: #28a745; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; margin-top: 10px;}
        .btn-salvar:hover { background: #218838; }
        .btn-voltar { display: inline-block; margin-bottom: 15px; padding: 10px 15px; background: #333; color: #e0e0e0; text-decoration: none; border-radius: 4px; border: 1px solid #444; }
        
        /* Alertas */
        .alert { padding: 15px; margin-bottom: 20px; border-radius: 4px; }
        .alert-error { background-color: rgba(220, 53, 69, 0.2); color: #f87171; border: 1px solid #dc3545; }
        .alert-success { background-color: rgba(40, 167, 69, 0.2); color: #4ade80; border: 1px solid #28a745; }
    </style>
</head>
<body>
<div class="container">
    <a href="{% url 'carteira' %}" class="btn-voltar">← Voltar para Carteira</a>
    <h2>Registrar Operação</h2>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST" action="">
        {% csrf_token %}

        <div class="form-group">
            <label for="ativo">Ativo:</label>
            <select name="ativo" id="ativo" required>
                <option value="">Selecione o ativo...</option>
                {% for ativo in ativos %}
                    <option value="{{ ativo.id }}">{{ ativo.ticker }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="tipo">Tipo de Operação:</label>
            <select name="tipo" id="tipo" required>
                <option value="C">Compra</option>
                <option value="V">Venda</option>
            </select>
        </div>

        <div class="form-group">
            <label for="corretora">Corretora:</label>
            <select name="corretora" id="corretora" required>
                <option value="">Selecione a corretora...</option>
                {% for corretora in corretoras %}
                    <option value="{{ corretora.id }}">{{ corretora.nome }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="quantidade">Quantidade:</label>
            <input type="number" step="0.0001" name="quantidade" id="quantidade" required placeholder="Ex: 100">
        </div>

        <div class="form-group">
            <label for="preco_unitario">Preço Unitário (R$):</label>
            <input type="number" step="0.01" name="preco_unitario" id="preco_unitario" required placeholder="Ex: 34.50">
        </div>

        <div class="form-group">
            <label for="data_transacao">Data da Transação:</label>
            <input type="date" name="data_transacao" id="data_transacao" required>
        </div>

        <button type="submit" class="btn-salvar">Salvar Operação</button>
    </form>
</div>
</body>
</html>
